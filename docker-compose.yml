version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: psa_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: psa_redis
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    container_name: psa_api
    restart: always
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./backend
    container_name: psa_worker
    restart: always
    depends_on:
      - redis
      - postgres
    env_file:
      - .env
    volumes:
      - ./backend:/app
    command: celery -A worker.celery_app worker --loglevel=info

volumes:
  pgdata: